services:
  postgres:
    image: postgres:16
    container_name: somali_ehr_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: somali_ehr
      POSTGRES_USER: ehr_user
      POSTGRES_PASSWORD: ehr_password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
